
name: .NET 9 MVC CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION: 'firstCICD.sln'
  PUBLISH_DIR: './publish'

jobs:
# =========================================
# JOB 1: CONTINUOUS INTEGRATION
# =========================================
  build-and-test:
    name: Build and Publish ASP.NET MVC
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 9 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

    - name: Publish MVC application
      run: dotnet publish ${{ env.SOLUTION }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: admincore-mvc-build
        path: ${{ env.PUBLISH_DIR }}
        retention-days: 1



